<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Forms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style2.css">
</head>

<body>
    <h1>Feedback Form</h1>
    <form action="" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="date">Date: </label>
        <input type="date" id="date" name="date"><br><br>

        <label for="tel">Tel Number: </label>
        <input type="tel" id="tel" name="tel"><br><br>

        <label for="feedback">Feedback:</label><br>
        <textarea id="feedback" name="feedback" rows="4" cols="50" required></textarea><br>
        <input type="button" name="reset" value="Reset" onclick="document.getElementById('feedback').value =0"><br><br>

        <input type="radio" id="satisfied" name="satisfied" value="satisfied">
        <label for="satisfied">Satisfied</label>

        <input type="radio" id="unsatisfied" name="satisfied" value="unsatisfied">
        <label for="unsatisfied">Unsatisfied</label> <br><br>

        <input type="submit" value="Submit Feedback" means="Submit your feedback">
    </form>
</body>

</html>
